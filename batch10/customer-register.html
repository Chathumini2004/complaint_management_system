<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-form">
        <h2>Customer Registration</h2>
        <p>Please fill in this form to create an account.</p>
        
        <form id="regForm">
            <div>
                <label for="name"><b>Full Name:</b></label>
                <input type="text" id="name" placeholder="Enter Full Name" required>
            </div>
            <br>
            <div>
                <label for="email"><b>Email Address:</b></label>
                <input type="email" id="email" placeholder="Enter Email" required>
            </div>
            <br>
            <div>
                <label for="phone"><b>Phone Number:</b></label>
                <input type="tel" id="phone" placeholder="Enter Phone Number" required>
            </div>
            <br>
            <div>
                <label for="password"><b>Password:</b></label>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>
            
            <button type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="customer-login.html">Login here</a>.</p>
    </div>

    
    <script>
        document.getElementById('regForm').addEventListener('submit', function(event) {
            // The page stops refreshing when the form is submitted.
            event.preventDefault();

            // 1. Get values ​​from input fields
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            // 2. That data is nicely put into a JavaScript Object.
            const userObject = {
                fullName: name,
                email: email,
                phone: phone,
                password: password
            };

            // 3. Converts the Object to a JSON String (JSON.stringify)
            const jsonUserString = JSON.stringify(userObject);

            // 4. Stored in the browser's LocalStorage under the name 'registeredUser'
            localStorage.setItem('registeredUser', jsonUserString);

            // 5. A successful alert is sent to the login page.
            alert('Registration Successful! Data saved as JSON.');
            window.location.href = 'customer-login.html';
        });
    </script>

</body>
</html>
