<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-form">
        <h2>Customer Login</h2>
        <p>Please enter your credentials to login.</p>
        
        <!-- id="loginForm" කියලා එකක් එකතු කරා JavaScript වලින් අල්ලගන්න -->
        <form id="loginForm">
            <div>
                <label for="email"><b>Email Address:</b></label>
                <input type="email" id="email" placeholder="Enter Email" required>
            </div>
            <br>
            <div>
                <label for="password"><b>Password:</b></label>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>
            
            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="customer-register.html">Register here</a>.</p>
        <p>Are you an Admin? <a href="admin-login.html">Admin Login here</a>.</p>
    </div>

    <!-- Validation JavaScript කොටස -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Page එක refresh වෙන එක නවත්වනවා

            // 1. User දැනට input fields වලට ටයිප් කරපු Email සහ Password ගන්නවා
            const inputEmail = document.getElementById('email').value;
            const inputPassword = document.getElementById('password').value;

            // 2. Register වෙද්දී localStorage එකේ 'registeredUser' නමින් සුරැකි JSON දත්ත කියවනවා
            const storedUserData = localStorage.getItem('registeredUser');

            // 3. කලින් register වුණු කිසිම කෙනෙක් නැත්නම් (LocalStorage හිස් නම්)
            if (!storedUserData) {
                alert('No registered customer found! Please register first.');
                window.location.href = 'customer-register.html';
                return;
            }

            // 4. JSON string එක ආයේ JavaScript Object එකක් බවට හරවා ගන්නවා
            const registeredUser = JSON.parse(storedUserData);

            // 5. User ගැසූ Email/Password සහ Register වුණු Email/Password සමානද කියා බලනවා (The Logic)
            if (inputEmail === registeredUser.email && inputPassword === registeredUser.password) {
                
                // දත්ත නිවැරදි නම් Dashboard එකට යවනවා
                alert('Login Successful! Welcome, ' + registeredUser.fullName);
                window.location.href = 'customer-dashboard.html';
                
            } else {
                // දත්ත වැරදි නම් error මැසේජ් එකක් දෙනවා
                alert('Invalid Email or Password! Please try again.');
            }
        });
    </script>

</body>
</html>
