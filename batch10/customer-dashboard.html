<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Complaint Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Customer Dashboard</h2>
    <p>Welcome! You can submit new complaints and track their status below. | <a href="customer-login.html">Logout</a></p>
    <hr>

    <h3>1. Submit a New Complaint</h3>
    <!-- I added id="complaintForm" to make it easier to grab with JavaScript. -->
    <form id="complaintForm">
        <div>
            <label for="productName"><b>Product Name:</b></label>
            <input type="text" id="productName" placeholder="Enter Product Name" required>
        </div>
        <br>
        <div>
            <label for="category"><b>Category:</b></label>
            <select id="category" required>
                <option value="">-- Select Category --</option>
                <option value="Food Quality">Food Quality</option>
                <option value="Packaging">Packaging</option>
                <option value="Delivery">Delivery</option>
                <option value="Hygiene">Hygiene</option>
            </select>
        </div>
        <br>
        <div>
            <label for="description"><b>Description:</b></label>
            <textarea id="description" rows="5" placeholder="Describe your issue here..." required></textarea>
        </div>
        <br>
        <div>
            <label><b>Complaint Priority:</b></label>
            <input type="radio" id="low" name="priority" value="Low" checked><label for="low">Low</label>
            <input type="radio" id="medium" name="priority" value="Medium"><label for="medium">Medium</label>
            <input type="radio" id="high" name="priority" value="High"><label for="high">High</label>
        </div>
        <br>
        <div>
            <label for="photo"><b>Optional Photo Upload:</b></label>
            <input type="file" id="photo" accept="image/*">
        </div>
        
        <button type="submit">Submit Complaint</button>
    </form>

    <hr>

    <h3>2. Your Complaint History & Status Updates</h3>
    <!-- To dynamically populate rows using JavaScript, add id="complaintTableBody" to the table body. -->
    <table>
        <thead>
            <tr>
                <th>Complaint ID</th>
                <th>Product Name</th>
                <th>Category</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Admin Response / Remarks</th>
            </tr>
        </thead>
        <tbody id="complaintTableBody">
            <!-- JavaScript will auto-populate the data here. -->
        </tbody>
    </table>

    <!-- The JavaScript section -->
    <script>
        // If there are previously saved complaints, it will be placed in the table as soon as the page loads.
        document.addEventListener('DOMContentLoaded', loadComplaints);

        document.getElementById('complaintForm').addEventListener('submit', function(event) {
            event.preventDefault(); // The page stops refreshing.

            // 1. Gets values ​​from form inputs
            const productName = document.getElementById('productName').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
            
            // How to get the value of the selected Radio Button
            const priority = document.querySelector('input[name="priority"]:checked').value; 

            // 2. Generates a random ID (e.g. #CMP4829)
            const complaintId = '#CMP' + Math.floor(1000 + Math.random() * 9000);

            // 3. A new complaint is created as an Object (the initial status will be "New").
            const newComplaint = {
                id: complaintId,
                product: productName,
                category: category,
                description: description,
                priority: priority,
                status: 'New',
                remarks: 'Pending admin review.'
            };

            // 4. Gets the complaints previously stored in localStorage. If there are none, an empty Array ([]) is taken.
            let complaintsList = JSON.parse(localStorage.getItem('allComplaints')) || [];

            // 5. Adding the new complaint to the Array (Push)
            complaintsList.push(newComplaint);

            // 6. Again, the Array is converted to a JSON string and saved in localStorage.
            localStorage.setItem('allComplaints', JSON.stringify(complaintsList));

            alert('Complaint submitted successfully and saved as JSON!');
            
            // The form is empty
            document.getElementById('complaintForm').reset();

            // Refresh the table to show new data.
            loadComplaints();
        });

        // Function to get JSON data from LocalStorage and put it into a table
        function loadComplaints() {
            const tableBody = document.getElementById('complaintTableBody');
            tableBody.innerHTML = ''; // Clean up the previous ones.

            // Retrieves the JSON string from LocalStorage and converts it back into a JavaScript Array (JSON.parse)
            const complaintsList = JSON.parse(localStorage.getItem('allComplaints')) || [];

            // If there is nothing on the list, I will leave a short message.
            if(complaintsList.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999;">No complaints submitted yet.</td></tr>`;
                return;
            }

            // A table row (tr) is created for each complaint in the array.
            complaintsList.forEach(function(complaint) {
                let statusColor = '#e67e22'; // In Progress is Orange
                if (complaint.status === 'New') statusColor = '#e74c3c'; // New is Red
                if (complaint.status === 'Resolved') statusColor = '#2ecc71'; // Green if Resolved

                const row = `
                    <tr>
                        <td>${complaint.id}</td>
                        <td>${complaint.product}</td>
                        <td>${complaint.category}</td>
                        <td>${complaint.priority}</td>
                        <td><span style="color: ${statusColor}; font-weight: bold;">${complaint.status}</span></td>
                        <td>${complaint.remarks}</td>
                    </tr>
                `;
                tableBody.innerHTML += row; // Adding a row to the table
            });
        }
    </script>

</body>
</html>
