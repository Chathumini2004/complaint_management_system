<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-form">
        <h2>Admin Login Portal</h2>
        <p>Authorized personnel only.</p>
        
        <form action="admin-dashboard.html" method="POST">
            <div>
                <label for="email"><b>Admin Email:</b></label>
                <input type="email" id="email" placeholder="Enter Admin Email" required>
            </div>
            <br>
            <div>
                <label for="password"><b>Password:</b></label>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>
            
            <button type="submit">Login as Admin</button>
        </form>

        <p>Switch back to <a href="customer-login.html">Customer Login</a>.</p>
    </div>

</body>
</html>
